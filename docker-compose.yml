version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xeno_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/xeno_crm
      REDIS_URL: redis://redis:6379/0
      CHANNEL_SERVICE_URL: http://channel-service:8001
      CRM_RECEIPT_URL: http://backend:8000/api/receipt
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python seed/seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  celery-worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/xeno_crm
      REDIS_URL: redis://redis:6379/0
      CHANNEL_SERVICE_URL: http://channel-service:8001
      CRM_RECEIPT_URL: http://backend:8000/api/receipt
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info -Q campaigns -c 4

  channel-service:
    build: ./channel-service
    ports:
      - "8001:8001"
    environment:
      CRM_RECEIPT_URL: http://backend:8000/api/receipt
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
